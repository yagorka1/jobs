<div class="jobs-container">
  <div class="jobs-header">
    <h1>My Job Applications</h1>
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <mat-icon>add</mat-icon>
      Add Job
    </button>
  </div>

  @if (jobs().length === 0) {
    <div class="empty-state">
      <mat-icon>work_off</mat-icon>
      <p>No job applications yet. Add your first one!</p>
    </div>
  } @else {
    <table mat-table [dataSource]="jobs()" class="jobs-table mat-elevation-z2">

      <ng-container matColumnDef="company">
        <th mat-header-cell *matHeaderCellDef>Company</th>
        <td mat-cell *matCellDef="let job">{{ job.company }}</td>
      </ng-container>

      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>Position</th>
        <td mat-cell *matCellDef="let job">{{ job.position }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let job">
          <span class="status-badge status-{{ job.status }}">{{ job.status }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="appliedAt">
        <th mat-header-cell *matHeaderCellDef>Applied At</th>
        <td mat-cell *matCellDef="let job">{{ job.appliedAt | date: 'mediumDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="link">
        <th mat-header-cell *matHeaderCellDef>Link</th>
        <td mat-cell *matCellDef="let job">
          @if (job.link) {
            <a [href]="job.link" target="_blank" rel="noopener noreferrer">
              <button mat-icon-button matTooltip="Open link">
                <mat-icon>open_in_new</mat-icon>
              </button>
            </a>
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let job">
          <button mat-icon-button matTooltip="Edit" (click)="openEditDialog(job)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Delete" color="warn" (click)="deleteJob(job)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  }
</div>
